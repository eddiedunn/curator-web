resolver 169.254.1.1 valid=30s;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy — set CURATOR_BACKEND_URL to your curator service address
    location /api/ {
        set $upstream http://your-curator-service.example.com;
        proxy_pass $upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Host your-curator-service.example.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check proxy
    location /health {
        set $upstream http://your-curator-service.example.com;
        proxy_pass $upstream/health;
        proxy_http_version 1.1;
        proxy_set_header Host your-curator-service.example.com;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA routing - try files then fallback to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
