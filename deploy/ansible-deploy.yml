---
# Deploy curator-web to tela (rootless, user-level Quadlet)
#
# Usage (run on tela as eddie with local connection):
#   ansible-playbook -i "127.0.0.1," deploy/ansible-deploy.yml \
#     --connection local -e curator_web_src_dir=<path>
#
# Variables:
#   curator_web_src_dir: path to checked-out repo on tela

- name: Deploy curator-web
  hosts: all
  gather_facts: false

  vars:
    service_name: curator-web
    quadlet_dir: /home/eddie/.config/containers/systemd
    curator_web_src_dir: "{{ ansible_env.HOME }}/curator-web"

  tasks:
    - name: Build container image from source
      ansible.builtin.command:
        cmd: >
          podman build
          -t localhost/curator-web:latest
          -f deploy/Dockerfile
          .
        chdir: "{{ curator_web_src_dir }}"
      changed_when: true

    - name: Copy quadlet container unit file
      ansible.builtin.copy:
        src: "{{ curator_web_src_dir }}/deploy/curator-web.container"
        dest: "{{ quadlet_dir }}/curator-web.container"
        remote_src: true
        mode: "0644"
      notify: Reload and restart curator-web

  handlers:
    - name: Reload user systemd daemon
      ansible.builtin.command:
        cmd: systemctl --user daemon-reload
      environment:
        XDG_RUNTIME_DIR: /run/user/1001
      listen: Reload and restart curator-web

    - name: Restart curator-web service
      ansible.builtin.command:
        cmd: systemctl --user restart curator-web
      environment:
        XDG_RUNTIME_DIR: /run/user/1001
      changed_when: true
      listen: Reload and restart curator-web
